    <script>
        (function() {
            
            const allTags = new Set();
            let activeTag = null;

            
            document.addEventListener('DOMContentLoaded', function() {
                const archiveItems = document.querySelectorAll('.archive-item[data-tags]');
                
                archiveItems.forEach(item => {
                    const tagsStr = item.getAttribute('data-tags');
                    if (tagsStr) {
                        tagsStr.split(',').forEach(tag => {
                            if (tag.trim()) {
                                allTags.add(tag.trim());
                            }
                        });
                    }
                });

                
                renderTagFilter();
            });

            
            function renderTagFilter() {
                const tagList = document.getElementById('tagFilterList');
                const clearBtn = document.getElementById('tagClearBtn');
                
                if (!tagList) return;
                
                tagList.innerHTML = '';
                
                
                const sortedTags = Array.from(allTags).sort();
                
                sortedTags.forEach(tag => {
                    const tagSpan = document.createElement('span');
                    tagSpan.className = 'tag-filter-item';
                    tagSpan.textContent = '#' + tag;
                    tagSpan.dataset.tag = tag;
                    
                    if (activeTag === tag) {
                        tagSpan.classList.add('active');
                    }
                    
                    tagSpan.addEventListener('click', function() {
                        if (activeTag === tag) {
                            activeTag = null;
                        } else {
                            activeTag = tag;
                        }
                        renderTagFilter();
                        filterArticles();
                    });
                    
                    tagList.appendChild(tagSpan);
                });
                
                
                if (clearBtn) {
                    clearBtn.style.display = activeTag ? 'inline-flex' : 'none';
                }
            }

            
            function filterArticles() {
                const archiveItems = document.querySelectorAll('.archive-item[data-tags]');
                const groupTitles = document.querySelectorAll('.group-title');
                let hasVisibleItem = false;

                archiveItems.forEach(item => {
                    const tagsStr = item.getAttribute('data-tags');
                    const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()) : [];
                    
                    if (activeTag && !tags.includes(activeTag)) {
                        item.style.display = 'none';
                    } else {
                        item.style.display = '';
                        hasVisibleItem = true;
                    }
                });

                
                groupTitles.forEach(title => {
                    let nextElement = title.nextElementSibling;
                    let hasVisibleSibling = false;
                    
                    while (nextElement && !nextElement.classList.contains('group-title')) {
                        if (nextElement.classList.contains('archive-item') && nextElement.style.display !== 'none') {
                            hasVisibleSibling = true;
                            break;
                        }
                        nextElement = nextElement.nextElementSibling;
                    }
                    
                    title.style.display = hasVisibleSibling ? '' : 'none';
                });
            }

            
            function clearTagFilter() {
                activeTag = null;
                renderTagFilter();
                filterArticles();
            }

            
            document.addEventListener('DOMContentLoaded', function() {
                const tagClearBtn = document.getElementById('tagClearBtn');
                
                if (tagClearBtn) {
                    tagClearBtn.addEventListener('click', clearTagFilter);
                }
            });
        })();
    </script></div>
